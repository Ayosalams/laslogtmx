<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>laslogTMX — Temporary Issue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, #0b1220 0%, #111827 55%, #0f172a 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      max-width: 32rem;

      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.04em; color: #00bfff; }
    h1 { margin-top: 1.25rem; font-size: 1.5rem; font-weight: 600; }

    .code { margin-top: 1rem; font-size: 3rem; font-weight: 700; color: #f59e0b; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.25rem;
      background: #00bfff;
      color: #0b1220;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
    }
    a:hover { background: #33ccff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">laslogTMX</div>
    <div class="code">500</div>

</html>
