# =============================================================================
# Supabase Keep-Alive — prevents free-tier project pause from inactivity.
#
# Pings the public Auth health endpoint (no API key required). Optionally
# validates REST access when SUPABASE_ANON_KEY is configured.
#
# Optional GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ANON_KEY  or  NEXT_PUBLIC_SUPABASE_ANON_KEY
#   (publishable sb_publishable_... or legacy JWT eyJ...)
#
# Optional URL override:
#   SUPABASE_URL  or  NEXT_PUBLIC_SUPABASE_URL
#   (defaults to production project URL below)
#
# One-time setup from repo root:
#   powershell -File infra/github/setup-keepalive-secrets.ps1
#
# Manual run: Actions → Supabase Keep-Alive → Run workflow
# Schedule: daily at 09:00 UTC
# =============================================================================

name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * *'   # Daily at 9:00 UTC
  workflow_dispatch:

env:
  DEFAULT_SUPABASE_URL: https://gnwufbvrxcvnrfvanmrg.supabase.co

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (health + optional REST)
        env:
          SECRET_URL: ${{ secrets.SUPABASE_URL }}
          SECRET_URL_ALT: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          VAR_URL: ${{ vars.SUPABASE_URL }}
          VAR_URL_ALT: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SECRET_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SECRET_KEY_ALT: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          VAR_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          VAR_KEY_ALT: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DEFAULT_SUPABASE_URL: ${{ env.DEFAULT_SUPABASE_URL }}
        run: |
          set -euo pipefail

          pick_first_nonempty() {
            for candidate in "$@"; do
              if [ -n "${candidate}" ]; then
                printf '%s' "${candidate}"
                return 0
              fi
            done
            return 1
          }

          normalize_value() {
            local value="$1"
            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            value="${value#\"}"; value="${value%\"}"
            value="${value#\'}"; value="${value%\'}"
            printf '%s' "${value}"
          }

          SUPABASE_URL="$(pick_first_nonempty \
            "${SECRET_URL:-}" \
            "${SECRET_URL_ALT:-}" \
            "${VAR_URL:-}" \
            "${VAR_URL_ALT:-}" \
            "${DEFAULT_SUPABASE_URL:-}" \
            || true)"
          SUPABASE_URL="$(normalize_value "${SUPABASE_URL}")"
          SUPABASE_URL="${SUPABASE_URL%/}"

          if [[ ! "${SUPABASE_URL}" =~ ^https?:// ]]; then
            if [[ "${SUPABASE_URL}" =~ ^[a-zA-Z0-9][-a-zA-Z0-9.]*\.supabase\.co$ ]]; then
              SUPABASE_URL="https://${SUPABASE_URL}"
            fi
          fi

          if [[ -z "${SUPABASE_URL}" || ! "${SUPABASE_URL}" =~ ^https?://[^/[:space:]?#]+ ]]; then
            echo "::error::Supabase URL is missing or invalid."
            exit 1
          fi

          HOST_PART="$(printf '%s' "${SUPABASE_URL}" | sed -E 's#^https?://([^/]+).*#\1#')"
          echo "Debug — target host: ${HOST_PART}"

          ping_url() {
            local label="$1"
            local url="$2"
            shift 2
            local output err code exit_code
            output="$(mktemp)"
            err="$(mktemp)"
            code="000"
            exit_code=0
            code="$(curl \
              --globoff \
              --silent \
              --show-error \
              --output "${output}" \
              --write-out '%{http_code}' \
              --max-time 30 \
              --retry 2 \
              --retry-delay 3 \
              --retry-connrefused \
              --request GET \
              --url "${url}" \
              "$@" \
              2>"${err}")" || exit_code=$?

            if [ "${exit_code}" -ne 0 ] && [ "${code}" = "000" ]; then
              echo "::error::${label} curl failed (exit ${exit_code})."
              if [ -s "${err}" ]; then
                echo "Debug — curl error: $(head -c 300 "${err}")"
              fi
              rm -f "${output}" "${err}"
              return 1
            fi

            echo "${label} HTTP status: ${code}"
            if [ "${code}" -ge 200 ] && [ "${code}" -lt 400 ]; then
              rm -f "${output}" "${err}"
              return 0
            fi

            if [ -s "${output}" ]; then
              echo "Response body (truncated):"
              head -c 300 "${output}"
              echo ""
            fi
            rm -f "${output}" "${err}"
            return 1
          }

          # ── Primary keep-alive: Auth health (no API key required) ─────────
          echo "Pinging Supabase Auth health endpoint…"
          if ping_url "Auth health" "${SUPABASE_URL}/auth/v1/health" \
            --header "Accept: application/json"; then
            echo "✅ Supabase keep-alive successful via Auth health check."
          else
            echo "::error::Supabase Auth health ping failed."
            exit 1
          fi

          # ── Optional: REST validation when API key is configured ──────────
          API_KEY="$(pick_first_nonempty \
            "${SECRET_KEY:-}" \
            "${SECRET_KEY_ALT:-}" \
            "${VAR_KEY:-}" \
            "${VAR_KEY_ALT:-}" \
            || true)"
          API_KEY="$(normalize_value "${API_KEY}")"

          if [ -z "${API_KEY}" ]; then
            echo "Note — no API key secret configured; skipped REST validation."
            exit 0
          fi

          echo "Validating REST API access (optional)…"
          REST_ARGS=(--header "apikey: ${API_KEY}" --header "Accept: application/json")

          # Publishable/secret keys (sb_*) are NOT JWTs — do not send Bearer auth.
          # Legacy anon JWT keys (eyJ...) require Authorization: Bearer.
          if [[ "${API_KEY}" == eyJ* ]]; then
            REST_ARGS+=(--header "Authorization: Bearer ${API_KEY}")
          fi

          if ping_url "REST" "${SUPABASE_URL}/rest/v1/" "${REST_ARGS[@]}"; then
            echo "✅ REST API validation successful."
          else
            echo "::warning::REST validation failed, but Auth health check passed."
            echo "If using sb_publishable_ keys, ensure the secret is current."
            echo "Keep-alive still succeeded — project activity was recorded."
          fi